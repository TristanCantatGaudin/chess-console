<!DOCTYPE html>
<html lang="de">
<head>
    <title>Chess Console - Puzzle Mode</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          crossorigin="anonymous">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <link rel="stylesheet" href="../assets/styles/screen.css"/>
</head>
<body>

<div class="container-fluid">
    <div id="console-container"></div>

    <pre id="pgnOutput"
         class="bg-light p-3 border rounded mt-4"
         style="white-space: pre-wrap;"></pre>

    <h4 class="mt-3">back to <a href="index.html">chess-console</a></h4>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/es-module-shims@1.7.2/dist/es-module-shims.min.js"></script>

<script type="importmap">
{
    "imports": {
        "cm-chessboard/": "../node_modules/cm-chessboard/",
        "cm-web-modules/": "../node_modules/cm-web-modules/",
        "chess.mjs/": "../node_modules/chess.mjs/",
        "cm-pgn/": "../node_modules/cm-pgn/",
        "cm-chess/": "../node_modules/cm-chess/",
        "bootstrap-show-modal/": "../node_modules/bootstrap-show-modal/"
    }
}
</script>

<script type="module">
import {ChessConsole} from "../src/ChessConsole.js"
import {PuzzlePlayer} from "../src/players/PuzzlePlayer.js"
import {PuzzleOpponent} from "../src/players/PuzzleOpponent.js"
import {Board} from "../src/components/Board.js"
import {GameStateOutput} from "../src/components/GameStateOutput.js"
import {History} from "../src/components/History.js"
import {CapturedPieces} from "../src/components/CapturedPieces.js"
import {HistoryControl} from "../src/components/HistoryControl.js"
import {GameControl} from "../src/components/GameControl/GameControl.js"
import {Persistence} from "../src/components/Persistence.js"
import {Sound} from "../src/components/Sound.js"
import {MoveComment} from "../src/components/MoveComment.js"

// Read study list
async function fetchStudyList() {
    const response = await fetch("../lichess_study_list.txt")
    if (!response.ok) throw new Error("Could not load ../lichess_study_list.txt")
    const text = await response.text()
    return text
        .split("\n")
        .map(line => line.trim())
        .filter(line => line.length > 0)
        .map(line => {
            const [studyId, orientation] = line.split(/\s+/)
            return { studyId, orientation: orientation || "black" }
        })
}

// Fetch PGN from local /pgn/{studyId}.pgn
async function fetchRandomChapter(studyId) {
    const response = await fetch(`../pgn/${studyId}.pgn`)
    if (!response.ok) throw new Error(`Failed to fetch ../pgn/${studyId}.pgn`)

    let fullPgn = await response.text()
    fullPgn = fullPgn.replace(/\r\n/g, "\n").trim()

    const chapters = fullPgn.split(/\n\n(?=\[Event )/)
    const randomIndex = Math.floor(Math.random() * chapters.length)
    let selectedPgn = chapters[randomIndex].trim()

    if (!selectedPgn.match(/(1-0|0-1|1\/2-1\/2|\*)\s*$/))
        selectedPgn += " *"

    return { pgn: selectedPgn }
}

(async () => {

    let studies
    try {
        studies = await fetchStudyList()
    } catch (err) {
        alert("Could not load ../lichess_study_list.txt")
        console.error(err)
        return
    }

    if (studies.length === 0) {
        alert("No studies found in ../lichess_study_list.txt")
        return
    }

    const randomStudy = studies[Math.floor(Math.random() * studies.length)]

    let selected
    try {
        selected = await fetchRandomChapter(randomStudy.studyId)
    } catch (err) {
        alert(`Failed loading ../pgn/${randomStudy.studyId}.pgn`)
        console.error(err)
        return
    }

    document.getElementById("pgnOutput").innerText = selected.pgn

    const orientation = randomStudy.orientation.toLowerCase()
    const playerIsBlack = orientation === "black"

    const boardThemes = [
        "default",
        "default-contrast",
        "green",
        "blue",
        "chess-club",
        "chessboard-js",
        "black-and-white"
    ]
    const randomTheme =
        boardThemes[Math.floor(Math.random() * boardThemes.length)]

    const puzzlePlayerConfig = {
        name: playerIsBlack ? "Opponent" : "Player",
        type: PuzzlePlayer,
        props: { allowPremoves: true, scriptPGN: selected.pgn }
    }

    const puzzleOpponentConfig = {
        name: playerIsBlack ? "Player" : "Opponent",
        type: PuzzleOpponent,
        props: { scriptPGN: selected.pgn, delay: 300 }
    }

    const whiteConfig = playerIsBlack ? puzzleOpponentConfig : puzzlePlayerConfig
    const blackConfig = playerIsBlack ? puzzlePlayerConfig : puzzleOpponentConfig

    new ChessConsole(
        document.getElementById("console-container"),
        whiteConfig,
        blackConfig,
        { pgn: selected.pgn }
    ).initialized.then((chessConsole) => {

        const savePrefix = "PuzzleMode"
        localStorage.removeItem(savePrefix + "Pgn")
        localStorage.removeItem(savePrefix + "PlayerColor")

        new Board(chessConsole, {
            assetsUrl: "../node_modules/cm-chessboard/assets/",
            orientation: playerIsBlack ? "b" : "w",
            style: {
                cssClass: randomTheme,
                showCoordinates: true,
                pieces: { file: "../assets/pieces/staunty.svg" }
            }
        }).initialized.then(() => {
            new Persistence(chessConsole, {savePrefix}).load()
        })

        new GameStateOutput(chessConsole)
        new History(chessConsole)
        new HistoryControl(chessConsole)
        new CapturedPieces(chessConsole)
        new GameControl(chessConsole)
        new MoveComment(chessConsole)
        new Sound(chessConsole, {
            soundSpriteFile: "../assets/sounds/chess_console_sounds.mp3"
        })
    })

})()
</script>

</body>
</html>
