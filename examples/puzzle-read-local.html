<!DOCTYPE html>
<html lang="en">
<head>
<title>Chess Console - Puzzle Mode</title>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>

<link rel="stylesheet" href="../assets/styles/screen.css"/>

<link rel="icon" type="image/png"
href="https://tristancantatgaudin.github.io/chess-console/favicon.png">

<style>

body{
    background:#121212;
    color:#e0e0e0;
}

.container-fluid{
    min-height:100vh;
    padding:2rem;
}

#pgnOutput{
    background:#1e1e1e;
    color:#f0f0f0;
    border:1px solid #333;
}

.study-list{
    background:#1e1e1e;
    border:1px solid #333;
    padding:1rem;
    border-radius:8px;
    max-height:260px;
    overflow-y:auto;
}

.btn{
    background:#333;
    color:#fff;
    border:1px solid #555;
}

.btn:hover{
    background:#555;
}
.move-comment{
    background:#111;
    color:#ffeb3b;
    border:2px solid #ffeb3b;

    box-shadow:
        0 0 5px #ffeb3b,
        0 0 10px #ffeb3b,
        0 0 20px #ffc107;

    text-shadow:0 0 5px #ffeb3b;
}

.move-comment strong{
    color:#ffffff;
}
.gameState {
    background: #0d1117 !important;
    color: #4fc3f7 !important;
    border: 2px solid #4fc3f7 !important;
    box-shadow:
        0 0 5px #4fc3f7,
        0 0 10px #4fc3f7,
        0 0 20px #0288d1;
    text-shadow: 0 0 5px #4fc3f7;
}
</style>
</head>

<body>

<div class="container-fluid">

<div id="console-container"></div>

<h4 class="mt-3">
back to <a href="../index.html">chess-console</a>
</h4>

<pre id="pgnOutput"
class="p-3 border rounded mt-4"
style="white-space:pre-wrap;"></pre>


<h4 class="mt-5">Study Selection</h4>

<div class="mb-2">

<button id="selectAllBtn" class="btn btn-sm me-2">
Select All
</button>

<button id="selectNoneBtn" class="btn btn-sm">
Deselect All
</button>

</div>

<div id="studyList" class="study-list mb-3"></div>

<button id="newPuzzleBtn" class="btn">
<i class="fas fa-random"></i> New Chapter
</button>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/es-module-shims@1.7.2/dist/es-module-shims.min.js"></script>

<script type="importmap">
{
"imports":{
"cm-chessboard/":"../assets/node_modules/cm-chessboard/",
"cm-web-modules/":"../assets/node_modules/cm-web-modules/",
"chess.mjs/":"../assets/node_modules/chess.mjs/",
"cm-pgn/":"../assets/node_modules/cm-pgn/",
"cm-chess/":"../assets/node_modules/cm-chess/",
"bootstrap-show-modal/":"../assets/node_modules/bootstrap-show-modal/"
}
}
</script>

<script type="module">

import {ChessConsole} from "../src/ChessConsole.js"
import {PuzzlePlayer} from "../src/players/PuzzlePlayer.js"
import {PuzzleOpponent} from "../src/players/PuzzleOpponent.js"
import {Board} from "../src/components/Board.js"
import {GameStateOutput} from "../src/components/GameStateOutput.js"
import {History} from "../src/components/History.js"
import {CapturedPieces} from "../src/components/CapturedPieces.js"
import {HistoryControl} from "../src/components/HistoryControl.js"
import {GameControl} from "../src/components/GameControl/GameControl.js"
import {Persistence} from "../src/components/Persistence.js"
import {MoveComment} from "../src/components/MoveComment.js"

let studies = []
let lastPuzzleKey = null


async function fetchStudyList(){

    const response = await fetch("../lichess_study_list.txt")
    const text = await response.text()

    return text
        .split("\n")
        .map(line => line.trim())
        .filter(line => line.length > 0)
        .map(line => {

            const commentSplit = line.split("#")

            const left = commentSplit[0].trim()
            const label = (commentSplit[1] || left).trim()

            const parts = left.split(/\s+/)

            return {
                studyId: parts[0],
                orientation: (parts[1] || "black").toLowerCase(),
                label
            }
        })
}



async function fetchRandomChapter(studyId){

    const response =
        await fetch(`../pgn/${studyId}.pgn?nocache=${Date.now()}`)

    let fullPgn = await response.text()

    fullPgn = fullPgn.replace(/\r\n/g,"\n").trim()

    const chapters =
        fullPgn.split(/\n\n(?=\[Event )/)

    let index
    let key

    do{
        index = Math.floor(Math.random()*chapters.length)
        key = studyId + "_" + index
    }
    while(key === lastPuzzleKey && chapters.length > 1)

    lastPuzzleKey = key

    let selected = chapters[index].trim()

    if(!selected.match(/(1-0|0-1|1\/2-1\/2|\*)\s*$/))
        selected += " *"

    return {pgn:selected}

}



function finalizePGN(pgn){

    pgn = pgn.replace(/\r\n/g,"\n").trim()

    const lines = pgn.split("\n")

    let lastMoveLineIndex = -1

    for(let i=lines.length-1;i>=0;i--){

        if(!lines[i].startsWith("[")){
            lastMoveLineIndex = i
            break
        }
    }

    if(lastMoveLineIndex >= 0){

        let lastLine = lines[lastMoveLineIndex].trim()

        if(lastLine.endsWith("*"))
            lastLine = lastLine.slice(0,-1).trim()

        if(!lastLine.endsWith("{END OF PGN}"))
            lastLine += " {END OF PGN}"

        lines[lastMoveLineIndex] = lastLine
    }

    return lines.join("\n")

}



function renderStudyCheckboxes(){

    const container = document.getElementById("studyList")
    container.innerHTML = ""

    const saved =
        JSON.parse(localStorage.getItem("selectedStudies") || "null")

    studies.forEach((study,i)=>{

        const id = "study_" + i

        let checked = true

        if(saved)
            checked = saved.includes(study.studyId)

        const div = document.createElement("div")
        div.className = "form-check"

        div.innerHTML = `
<input class="form-check-input study-checkbox"
type="checkbox"
id="${id}"
data-study="${study.studyId}"
${checked ? "checked" : ""}>
<label class="form-check-label" for="${id}">
${study.label}
</label>
`

        container.appendChild(div)

    })

}



function getSelectedStudies(){

    const boxes =
        document.querySelectorAll(".study-checkbox")

    return studies.filter((s,i)=>boxes[i].checked)

}



function saveSelections(){

    const checked =
        [...document.querySelectorAll(".study-checkbox")]
        .filter(c=>c.checked)
        .map(c=>c.dataset.study)

    localStorage.setItem(
        "selectedStudies",
        JSON.stringify(checked)
    )

}



function setAllStudies(state){

    document
        .querySelectorAll(".study-checkbox")
        .forEach(cb => cb.checked = state)

    saveSelections()

}



async function loadPuzzle(){

    saveSelections()

    const selected = getSelectedStudies()

    if(selected.length === 0){
        alert("Please select at least one study.")
        return
    }

    const randomStudy =
        selected[Math.floor(Math.random()*selected.length)]

    const chapter =
        await fetchRandomChapter(randomStudy.studyId)

    const finalizedPGN =
        finalizePGN(chapter.pgn)

    document.getElementById("pgnOutput")
        .innerText = finalizedPGN

    startChess(finalizedPGN,randomStudy.orientation)

}



function startChess(pgn,orientation){

    document.getElementById("console-container").innerHTML=""

    const pieceSets=[
        "anarchy.svg","anarchy_candy.svg","anarchy_fresh.svg",
        "anarchy_halloween.svg","caliente.svg","caliente_blue.svg",
        "caliente_pink.svg","checkers.svg","cooke.svg","disguised.svg",
        "pixel.svg","pixel_neon.svg","regular.svg","rhosgfx.svg",
        "smart_blue.svg","standard.svg","staunty.svg","staunty_blue.svg",
        "tatiana.svg","tatiana_calm.svg","trendy.svg"
    ]

    const boardThemes=[
        "blue","black-and-white"
    ]

    const randomPieceSet =
        pieceSets[Math.floor(Math.random()*pieceSets.length)]

    const randomTheme =
        boardThemes[Math.floor(Math.random()*boardThemes.length)]

    const playerIsBlack = orientation === "black"

    const puzzlePlayerConfig={
        name:playerIsBlack?"Opponent":"Player",
        type:PuzzlePlayer,
        props:{allowPremoves:true,scriptPGN:pgn}
    }

    const puzzleOpponentConfig={
        name:playerIsBlack?"Player":"Opponent",
        type:PuzzleOpponent,
        props:{scriptPGN:pgn,delay:1500}
    }

    const whiteConfig =
        playerIsBlack ? puzzleOpponentConfig : puzzlePlayerConfig

    const blackConfig =
        playerIsBlack ? puzzlePlayerConfig : puzzleOpponentConfig


    new ChessConsole(
        document.getElementById("console-container"),
        whiteConfig,
        blackConfig,
        {pgn}
    ).initialized.then((chessConsole)=>{

        const savePrefix="PuzzleMode"

        localStorage.removeItem(savePrefix+"Pgn")
        localStorage.removeItem(savePrefix+"PlayerColor")

        new Board(chessConsole,{
            assetsUrl:"../assets/node_modules/cm-chessboard/assets/",
            orientation:playerIsBlack?"b":"w",
            style:{
                cssClass:randomTheme,
                showCoordinates:true,
                pieces:{
                    file:`../assets/pieces/${randomPieceSet}`
                }
            }
        }).initialized.then(()=>{

            new Persistence(
                chessConsole,
                {savePrefix}
            ).load()

        })

        new GameStateOutput(chessConsole)
        new History(chessConsole)
        new HistoryControl(chessConsole)
        new CapturedPieces(chessConsole)
        new GameControl(chessConsole)
        new MoveComment(chessConsole)

        const chess = chessConsole.state.chess
        const moves = chess.history({verbose:true})

        moves.forEach((moveObj,ply)=>{

            const commentMatch =
                /{([^}]+)}/.exec(moveObj.san)

            if(commentMatch){

                chessConsole.messageBroker.publish(
                    "addMoveComment",
                    {
                        ply,
                        comment:commentMatch[1]
                    }
                )
            }

        })

    })

}



(async()=>{

    studies = await fetchStudyList()

    renderStudyCheckboxes()

    document
        .getElementById("newPuzzleBtn")
        .addEventListener("click",loadPuzzle)

    document
        .getElementById("selectAllBtn")
        .addEventListener("click",()=>setAllStudies(true))

    document
        .getElementById("selectNoneBtn")
        .addEventListener("click",()=>setAllStudies(false))

    await loadPuzzle()

})()

</script>

</body>
</html>
