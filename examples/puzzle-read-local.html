<!DOCTYPE html>
<html lang="en">
<head>
    <title>Chess Console - Puzzle Mode</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          crossorigin="anonymous">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <link rel="stylesheet" href="../assets/styles/screen.css"/>
    <link rel="icon" type="image/png" sizes="32x32" href="https://tristancantatgaudin.github.io/chess-console/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://tristancantatgaudin.github.io/chess-console/favicon.png">
    <link rel="shortcut icon" href="https://tristancantatgaudin.github.io/chess-console/favicon.png">
    <link rel="apple-touch-icon" href="https://tristancantatgaudin.github.io/chess-console/favicon.png">

    <style>
    body {
        background-color: #121212;
        color: #e0e0e0;
    }
    .container-fluid {
        background-color: #121212;
        color: #e0e0e0;
        min-height: 100vh;
        padding: 2rem;
    }
    #pgnOutput {
        background-color: #1e1e1e !important;
        color: #f0f0f0 !important;
        border: 1px solid #333;
    }
    a { color: #80cbc4; }
    a:hover { color: #4db6ac; }
    h1,h2,h3,h4 { color: #ffffff; }
    .btn { background-color: #333; color: #fff; border: 1px solid #555; }
    .btn:hover { background-color: #555; }
    .move-comment { background-color: #1e1e1e !important; color: #f0f0f0 !important; border: 1px solid #333 !important; }
    .move-comment strong { color: #ffffff; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div id="console-container"></div>

    <pre id="pgnOutput"
         class="bg-light p-3 border rounded mt-4"
         style="white-space: pre-wrap;"></pre>

    <h4 class="mt-3">back to <a href="../index.html">chess-console</a></h4>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/es-module-shims@1.7.2/dist/es-module-shims.min.js"></script>

<script type="importmap">
{
    "imports": {
        "cm-chessboard/": "../assets/node_modules/cm-chessboard/",
        "cm-web-modules/": "../assets/node_modules/cm-web-modules/",
        "chess.mjs/": "../assets/node_modules/chess.mjs/",
        "cm-pgn/": "../assets/node_modules/cm-pgn/",
        "cm-chess/": "../assets/node_modules/cm-chess/",
        "bootstrap-show-modal/": "../assets/node_modules/bootstrap-show-modal/"
    }
}
</script>

<script type="module">
import {ChessConsole} from "../src/ChessConsole.js"
import {PuzzlePlayer} from "../src/players/PuzzlePlayer.js"
import {PuzzleOpponent} from "../src/players/PuzzleOpponent.js"
import {Board} from "../src/components/Board.js"
import {GameStateOutput} from "../src/components/GameStateOutput.js"
import {History} from "../src/components/History.js"
import {CapturedPieces} from "../src/components/CapturedPieces.js"
import {HistoryControl} from "../src/components/HistoryControl.js"
import {GameControl} from "../src/components/GameControl/GameControl.js"
import {Persistence} from "../src/components/Persistence.js"
import {Sound} from "../src/components/Sound.js"
import {MoveComment} from "../src/components/MoveComment.js"

// ---------------- PGN fetch helpers ----------------
async function fetchStudyList() {
    const response = await fetch("../lichess_study_list.txt")
    if (!response.ok) throw new Error("Could not load ../lichess_study_list.txt")
    const text = await response.text()
    return text
        .split("\n")
        .map(line => line.trim())
        .filter(line => line.length > 0)
        .map(line => {
            const [studyId, orientation] = line.split(/\s+/)
            return { studyId, orientation: orientation || "black" }
        })
}

async function fetchRandomChapter(studyId) {
    const response = await fetch(`../pgn/${studyId}.pgn?nocache=${Date.now()}`)
    if (!response.ok) throw new Error(`Failed to fetch ../pgn/${studyId}.pgn`)

    let fullPgn = await response.text()
    fullPgn = fullPgn.replace(/\r\n/g, "\n").trim()

    const chapters = fullPgn.split(/\n\n(?=\[Event )/)
    const randomIndex = Math.floor(Math.random() * chapters.length)
    let selectedPgn = chapters[randomIndex].trim()

    if (!selectedPgn.match(/(1-0|0-1|1\/2-1\/2|\*)\s*$/))
        selectedPgn += " *"

    return { pgn: selectedPgn }
}

// ---------------- PGN finalize function ----------------
function finalizePGN(pgn) {
    pgn = pgn.replace(/\r\n/g, "\n").trim();
    const lines = pgn.split("\n");
    let lastMoveLineIndex = -1;

    for (let i = lines.length - 1; i >= 0; i--) {
        if (!lines[i].startsWith("[")) {
            lastMoveLineIndex = i;
            break;
        }
    }

    if (lastMoveLineIndex >= 0) {
        let lastLine = lines[lastMoveLineIndex].trim();

        // Remove trailing '*' if present
        if (lastLine.endsWith("*")) {
            lastLine = lastLine.slice(0, -1).trim();
        }

        // Append END OF PGN comment
        if (!lastLine.endsWith("{END OF PGN}")) {
            lastLine += " {END OF PGN}";
        }

        lines[lastMoveLineIndex] = lastLine;
    }

    return lines.join("\n");
}

// ---------------- MAIN ----------------
(async () => {
    const pieceSets = [
        "anarchy.svg","anarchy_candy.svg","anarchy_fresh.svg","anarchy_halloween.svg",
        "caliente.svg","caliente_blue.svg","caliente_pink.svg","checkers.svg","cooke.svg",
        "disguised.svg","pixel.svg","pixel_neon.svg","regular.svg","rhosgfx.svg",
        "smart_blue.svg","standard.svg","staunty.svg","staunty_blue.svg","tatiana.svg",
        "tatiana_calm.svg","trendy.svg"
    ];
    const boardThemes = ["blue","black-and-white"];

    const randomPieceSet = pieceSets[Math.floor(Math.random() * pieceSets.length)];
    const randomTheme = boardThemes[Math.floor(Math.random() * boardThemes.length)];

    console.log("Selected piece set:", randomPieceSet)
    console.log("Selected board theme:", randomTheme)

    let studies
    try {
        studies = await fetchStudyList()
    } catch (err) {
        alert("Could not load ../lichess_study_list.txt")
        console.error(err)
        return
    }

    if (studies.length === 0) {
        alert("No studies found in ../lichess_study_list.txt")
        return
    }

    const randomStudy = studies[Math.floor(Math.random() * studies.length)]
    let selected
    try {
        selected = await fetchRandomChapter(randomStudy.studyId)
    } catch (err) {
        alert(`Failed loading ../pgn/${randomStudy.studyId}.pgn`)
        console.error(err)
        return
    }

    // ---------------- FINALIZE PGN ----------------
    const finalizedPGN = finalizePGN(selected.pgn);
    document.getElementById("pgnOutput").innerText = finalizedPGN;

    const orientation = randomStudy.orientation.toLowerCase()
    const playerIsBlack = orientation === "black"

    const puzzlePlayerConfig = {
        name: playerIsBlack ? "Opponent" : "Player",
        type: PuzzlePlayer,
        props: { allowPremoves: true, scriptPGN: finalizedPGN }
    }

    const puzzleOpponentConfig = {
        name: playerIsBlack ? "Player" : "Opponent",
        type: PuzzleOpponent,
        props: { scriptPGN: finalizedPGN, delay: 1500 }
    }

    const whiteConfig = playerIsBlack ? puzzleOpponentConfig : puzzlePlayerConfig
    const blackConfig = playerIsBlack ? puzzlePlayerConfig : puzzleOpponentConfig

    new ChessConsole(
        document.getElementById("console-container"),
        whiteConfig,
        blackConfig,
        { pgn: finalizedPGN }
    ).initialized.then((chessConsole) => {

        const savePrefix = "PuzzleMode"
        localStorage.removeItem(savePrefix + "Pgn")
        localStorage.removeItem(savePrefix + "PlayerColor")

        new Board(chessConsole, {
            assetsUrl: "../assets/node_modules/cm-chessboard/assets/",
            orientation: playerIsBlack ? "b" : "w",
            style: {
                cssClass: randomTheme,
                showCoordinates: true,
                pieces: { file: `../assets/pieces/${randomPieceSet}` }
            }
        }).initialized.then(() => {
            new Persistence(chessConsole, {savePrefix}).load()
        })

        new GameStateOutput(chessConsole)
        new History(chessConsole)
        new HistoryControl(chessConsole)
        new CapturedPieces(chessConsole)
        new GameControl(chessConsole)
        const moveCommentComp = new MoveComment(chessConsole)

        // ---------------- PARSE COMMENTS FROM PGN ----------------
        const chess = chessConsole.state.chess;
        const moves = chess.history({verbose:true});
        moves.forEach((moveObj, ply) => {
            const commentMatch = /{([^}]+)}/.exec(moveObj.san);
            if (commentMatch) {
                const comment = commentMatch[1];
                chessConsole.messageBroker.publish('addMoveComment', {ply, comment});
            }
        });
    })
})()
</script>

</body>
</html>
